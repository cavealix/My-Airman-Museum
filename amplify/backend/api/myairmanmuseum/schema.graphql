type Brick @model {
  id: ID!
  Name_Key: Int
  Paver_Lines: String
  Row: Int
  Column: Int
  Lat: Float
  Lon: Float
}

type Query {
  # Your search query now routes to the Lambda function
  searchPavers(query: String!): [Brick] 
    @function(name: "rdsSearchHandler-${env}")   # <-- This attaches your Lambda
}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paver Finder</title>
    <!-- Include the AWS Amplify bundle from CDN for simple HTML use -->
    <script src="https://cdn.jsdelivr.net/npm/aws-amplify@6.0.28/dist/aws-amplify.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Bricks_app.css">
</head>

<body>
    <header>
        <h1>Paver Finder</h1>
    </header>

    <main>
        <div class="search-container">
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="Search by name or brick number...">
                <button class="search-btn" onclick="searchPavers()">Search</button>
            </div>
        </div>

        <div id="results"></div>
        <div id="map-container"></div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const GOOGLE_MAPS_KEY = 'AIzaSyCfcA4-8Bp4xjuhGzKMUpZGxi3h9IjA4Ko';
        // ---------------------

        let map;
        let marker;

        async function initMap() {
            // Initialize map but keep it hidden until needed
            const defaultPos = { lat: 39.8283, lng: -98.5795 }; // Center of USA default
            try {
                const { Map } = await google.maps.importLibrary("maps");
                const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

                map = new Map(document.getElementById("map-container"), {
                    zoom: 15,
                    center: defaultPos,
                    mapId: "DEMO_MAP_ID", // Required for AdvancedMarkerElement
                    mapTypeId: google.maps.MapTypeId.SATELLITE
                });
            } catch (e) {
                console.error("Map load failed", e);
            }
        }

        async function searchPavers() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
        
            const resultsDiv = document.getElementById('results');
            const mapContainer = document.getElementById('map-container');
        
            // UI Reset
            resultsDiv.innerHTML = '<div class="no-results">Searching...</div>';
            mapContainer.style.display = 'none';
        
            try {
                // Use the full API Gateway URL with /search path and q= parameter
                const apiUrl = `https://0sg0azj4vl.execute-api.us-east-1.amazonaws.com/ main/    search?q=${encodeURIComponent(query)}`;
        
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
        
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `API returned ${response.status}`);
                }
        
                let data = await response.json();
        
                // If your Lambda returns { results: [...] } or similar wrapper, adjust here
                if (data.results) {
                    data = data.results;
                }
        
                // Deduplicate by Name_Key (client-side safety)
                const uniqueData = Array.from(
                    new Map(data.map(item => [item.Name_Key, item])).values()
                ).filter(item => item.Lat && item.Lon);
        
                if (uniqueData.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-results">No matches found.</div>'    ;
                    return;
                }
        
                renderResults(uniqueData);
        
            } catch (err) {
                console.error('Search error:', err);
                resultsDiv.innerHTML = `<div class="no-results">Error: ${err.message}</div>`    ;
            }
        }

        function renderResults(data) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `
                    <span class="result-name">${escapeHtml(item.Paver_Lines)} - Row:${item.Row}, Column:${item.Column}</span>
                    <span class="result-arrow">📍</span>
                `;
                div.onclick = () => selectPaver(item);
                resultsDiv.appendChild(div);
            });
        }

        async function selectPaver(item) {
            // Ensure we have lat/lon
            if (!item.Lat || !item.Lon) {
                alert("Location data missing for this entry.");
                return;
            }

            const lat = parseFloat(item.Lat);
            const lng = parseFloat(item.Lon);

            // Show map
            const mapContainer = document.getElementById('map-container');
            mapContainer.style.display = 'block';

            // Scroll to map on mobile
            if (window.innerWidth < 640) {
                mapContainer.scrollIntoView({ behavior: 'smooth' });
            }

            if (map) {
                const pos = { lat, lng };
                map.setCenter(pos);
                map.setZoom(18); // Close zoom for specific paver

                if (marker) marker.setMap(null); // Remove old

                // Create new marker
                try {
                    const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
                    marker = new AdvancedMarkerElement({
                        map: map,
                        position: pos,
                        title: item.Paver_Lines
                    });
                } catch (e) {
                    // Fallback if marker lib fails
                    new google.maps.Marker({
                        position: pos,
                        map: map,
                        title: item.Paver_Lines
                    });
                }
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Handle "Enter" key in search box
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchPavers();
            }
        });

    </script>

    <!-- Load Google Maps -->
    <script>
        (g => { var h, a, k, p = "The Google Maps JavaScript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window; b = b[c] || (b[c] = {}); var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams, u = () => h || (h = new Promise(async (f, n) => { await (a = m.createElement("script")); e.set("libraries", [...r] + ""); for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]); e.set("callback", c + ".maps." + q); a.src = `https://maps.${c}apis.com/maps/api/js?` + e; d[q] = f; a.onerror = () => h = n(Error(p + " could not load.")); a.nonce = m.querySelector("script[nonce]")?.nonce || ""; m.head.append(a) })); d[l] ? console.warn(p + " only loads once. Ignoring:", g) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n)) })({
            key: "AIzaSyCfcA4-8Bp4xjuhGzKMUpZGxi3h9IjA4Ko",
            v: "weekly",
        });

        // Start map init
        window.addEventListener('load', initMap);
    </script>
</body>

</html>
